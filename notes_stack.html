<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note Stack</title>

<style>

/* ===== BODY ===== */
body{
  font-family: Arial;
}

/* ===== STACK ===== */
.note-list{
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 100px;
  position: relative;
}

/* CARD */
.note-container{
  width: 260px;
  height: 250px;
  border: 2px solid blue;
  border-radius: 20px;
  background: white;
  position: absolute;
  transition: 0.4s;
  padding: 10px;
}

/* stack positions */
.note-container:nth-child(1){
  transform: scale(1);
  z-index: 3;
  top: 0;
}
.note-container:nth-child(2){
  transform: scale(0.95);
  z-index: 2;
  top: 20px;
  opacity: 0.8;
}
.note-container:nth-child(3){
  transform: scale(0.9);
  z-index: 1;
  top: 40px;
  opacity: 0.6;
}

/* ===== CONTENT ===== */
.circle{
  height: 50px;
  width: 50px;
  border-radius: 50%;
  overflow: hidden;
}

.circle img{
  height: 100%;
  width: 100%;
  object-fit: cover;
}

h3, h4{
  margin: 8px 0;
}

span{
  margin-left: 10px;
}

button{
  margin-top: 5px;
  margin-right: 5px;
  border-radius: 10px;
}

/* ===== ICONS ===== */
.left-icons{
  position: fixed;
  left: 50px;
  top: 40%;
  display: flex;
  flex-direction: column;
  gap: 15px;
  font-size: 25px;
  cursor: pointer;
}

#toast{
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.4s;
}

#toast.show{
  opacity: 1;
}
</style>
</head>

<body>

<!-- STACK -->
<div class="note-list">

  <div class="note-container">
    <div class="circle">
      <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba">
    </div>
    <h3>Fatima Uma</h3>
    <h4>Hometown <span>Singapore</span></h4>
    <h4>Bookings <span>3 hours</span></h4>
    <button>📞 Call</button>
    <button>Message</button>
  </div>

  <div class="note-container">
    <div class="circle">
      <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d">
    </div>
    <h3>Ayesha Khan</h3>
    <h4>Hometown <span>Delhi</span></h4>
    <h4>Bookings <span>1 hour</span></h4>
    <button>📞 Call</button>
    <button>Message</button>
  </div>

  <div class="note-container">
    <div class="circle">
      <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e">
    </div>
    <h3>Neha Sharma</h3>
    <h4>Hometown <span>Mumbai</span></h4>
    <h4>Bookings <span>30 min</span></h4>
    <button>📞 Call</button>
    <button>Message</button>
  </div>

</div>

<!-- ICONS -->
<div class="left-icons">
  <span id="add">➕</span>
  <span id="up">⬆️</span>
  <span id="down">⬇️</span>
</div>

<div id="toast"></div>
<script>
const noteList = document.querySelector(".note-list");

const addBtn = document.getElementById("add");
const upBtn = document.getElementById("up");
const downBtn = document.getElementById("down");

// ➕ or ⬇️ → top card neeche
function moveDown(){
  const first = noteList.firstElementChild;
  noteList.appendChild(first);
}

// ⬆️ → last card upar
function moveUp(){
  const last = noteList.lastElementChild;
  noteList.prepend(last);
}

addBtn.addEventListener("click", moveDown);
downBtn.addEventListener("click", moveDown);
upBtn.addEventListener("click", moveUp);

const toast = document.getElementById("toast");

// function to show message
function showMsg(text){
  toast.innerText = text;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },2000);
}

// event delegation (important)
document.querySelector(".note-list").addEventListener("click", (e)=>{

  const card = e.target.closest(".note-container");
  if(!card) return;

  const name = card.querySelector("h3").innerText;

  // CALL button
  if(e.target.innerText.includes("Call")){
    showMsg("📞 Connected to " + name);
  }

  // MESSAGE button
  if(e.target.innerText.includes("Message")){
    showMsg("💬 Hello " + name);
  }

});
</script>

</body>
</html>
